<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
     {% load static %}
     
     <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3" crossorigin="anonymous">
    <!--<link rel="stylesheet" type="text/css" href="{% static 'holiday.css' %}" media="screen" />-->
    <link rel="stylesheet" type="text/css" href="{% static 'custom.css' %}" media="screen" /> 
    <title>Bankea</title>
</head>

<nav>
    {% block content%}
    {% include 'navbar.html' %}
    {% endblock %}
</nav>



<body>
<div class="base-wrap">
    

    <header>
        {% if user.is_staff %}
        <h2>Welcome to Bankea Staff Portal</h2><hr>
        {% else %}
        <h2><i>Welcome to Bankea<i></h2><hr>
        {% endif %}
    </header>
    
    <main>
    {% block main %}
    {% endblock main %}
    </main>
<br><br><br>

    <footer>
       <style>
#foot{
    background: #2d3b55;
    height: 40px;
    width: 100%;
    text-align: center;
    
}
p{
    color:Red;
}
       </style>

       <div id="foot">
        <p> &copy; 2022 Popular Belbase. </p>

    </div>
        
    </footer>

    <script src="https://unpkg.com/htmx.org@1.5.0" integrity="sha384-oGA+prIp5Vchu6we2YkI51UtVzN9Jpx2Z7PnR1I78PnZlN8LkrCT4lqqqmDkyrvI" crossorigin="anonymous"></script>
    <script>
        document.body.addEventListener('htmx:configRequest', (event) => {
            event.detail.headers['X-CSRFToken'] = '{{ csrf_token }}';
        })

    </script>
    </div>
</body>
</html>
