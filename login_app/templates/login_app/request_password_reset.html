{% extends "login_app/base.html" %}

{% block main %}

<style>
    input[type=text], 
    select {
      width: 100%;
      padding: 10px 15px;
      margin: 8px 0;
      display: inline-block;
      border: 1px solid #ccc;
      border-radius: 4px;
      box-sizing: border-box;
    }
    input[type=submit] {
      width: 50%;
      background-color: #4CAF50;
      color: white;
      padding: 14px 20px;
      margin: 8px 0;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }
    
    
    input[type=submit]:hover {
      background-color: #45a049;
    }
    
    div {
      border-radius: 5px;
      background-color: #f2f2f2;
      padding: 10px;
    }
    </style>

   <h1>Request Password Reset</h1>
   <div>
   <hr />
      <form action="{% url 'login_app:request_password_reset' %}" method="POST">
            {% csrf_token %}
            
            <label for="fname">User Name</label>
            <input type="text" id="fname" name="username" placeholder="Username..">
        
           <label for="fname">Email Address</label>
            <input type="text" id="fname" name="email" placeholder="Please enter your email">
        
          
            <input type="submit" value="Submit">
          </form>
        </div>
   <hr />

   {% endblock main %}
