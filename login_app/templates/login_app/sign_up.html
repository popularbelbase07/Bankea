{% extends "login_app/base.html" %}

{% block main %}
<style>
body {font-family: Arial, Helvetica, sans-serif;}
* {box-sizing: border-box;}

/* Full-width input fields */
input[type=text], input[type=password] {
  width: 100%;
  padding: 8px;
  margin: 5px 0 5px 0;
  display: inline-block;
  border: none;
  background: #f1f1f1;
}

/* Add a background color when the inputs get focus */
input[type=text]:focus, input[type=password]:focus {
  background-color: #ddd;
  outline: none;
}

/* Set a style for all buttons */
button {
  background-color: #04AA6D;
  color: white;
  padding: 10px 15px;
  margin: 5px, 0px;
  border: none;
  cursor: pointer;
  width: 20%;
  opacity: 0.9;
}

button:hover {
  opacity:1;
}

.cancel{
background-color:red;
}

/* Style the horizontal ruler */
hr {
  border: 1px solid #f1f1f1;
  margin-bottom: 20px;
}

/* Clear floats */
.clearfix::after {
  content: "";
  clear: both;
  display: table;
}

</style>
<body>
      <h2>Sign Up</h2>
      <p>Please fill in this form to create an account.</p>
      <hr>
      <form action="{% url 'login_app:sign_up' %}" method="POST">
        {% csrf_token %}
      <label for="email"><b>UserName</b></label>
      <input type="text" placeholder="Enter your Username" name="user" required>

      <label for="email"><b>Email</b></label>
      <input type="text" placeholder="Enter your Email" name="email" required>

      <label for="psw"><b>Password</b></label>
      <input type="password" placeholder="Enter your Password" name="password" required>

      <label for="psw-repeat"><b>Repeat Password</b></label>
      <input type="password" placeholder="Repeat your Password" name="password_repeat" required>

     <div class="clearfix">
        <button class="cancel" type="button">Cancel</button>
        <button type="submit" class="signupbtn">Sign Up</button>
      </div>
    </div>
  </form>
</div>

{% if error %}
{{ error }}
{% endif %}

{% endblock %}
